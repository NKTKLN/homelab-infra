# Required for routing/VPN functionality
sysctl_settings:
  net.ipv4.ip_forward: 1

# wg-easy (WireGuard with web UI)
wireguard_endpoint: "CHANGE_ME_PUBLIC_IP"
wireguard_client_address_range: "10.10.10.x"
wireguard_dns: "1.1.1.1"
wireguard_lan_cidr: "192.168.1.0/24"

# Web UI admin password hash (bcrypt). Generate with:
#   docker run --rm ghcr.io/wg-easy/wg-easy:14 wgpw 'your-password'
# Prefer ansible-vault / host_vars over committing the real hash.
wireguard_password_hash: ""
