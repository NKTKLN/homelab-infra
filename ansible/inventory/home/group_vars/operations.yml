# Additional packages for operations nodes.
# Focused on maintenance and basic troubleshooting.
common_packages_extra:
  - gnupg
  - apt-transport-https
  - openssh-client
  - iproute2
  - iputils-ping
  - lsof
  - tree
  - yq

# Ports allowed by UFW when the firewall is enabled.
# SSH port is configurable via `ssh_port`.
ufw_allowed_ports:
  - "{{ ssh_port }}"
