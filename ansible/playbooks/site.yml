- name: Baseline for all VMs
  hosts: vms
  become: true
  tasks:
    - name: Apply common_baseline role
      ansible.builtin.import_role:
        name: common_baseline
      tags: [baseline]

    - name: Apply base_server role
      ansible.builtin.import_role:
        name: base_server
      tags: [base]

- name: Baseline for all containers
  hosts: containers
  become: true
  tasks:
    - name: Apply common_baseline role
      ansible.builtin.import_role:
        name: common_baseline
      tags: [baseline]

    - name: Apply base_container role
      ansible.builtin.import_role:
        name: base_container
      tags: [base]

- name: VPN servers
  hosts: vpn
  become: true
  tasks:
    - name: Apply wireguard role
      ansible.builtin.import_role:
        name: wireguard
      tags: [vpn]

- name: Gateway servers
  hosts: gateway
  become: true
  tasks:
    - name: Apply caddy role
      ansible.builtin.import_role:
        name: caddy
      tags: [caddy]

- name: GPU workers servers
  hosts: gpu-workers
  become: true
  tasks:
    - name: Apply docker role
      ansible.builtin.import_role:
        name: docker
      tags: [docker]

    - name: Apply cuda_tools role
      ansible.builtin.import_role:
        name: cuda_tools
      tags: [cuda]

- name: Amnezia proxy servers
  hosts: proxy
  become: true
  tasks:
    - name: Apply docker role
      ansible.builtin.import_role:
        name: docker
      tags: [docker]

    - name: Apply amnezia_proxy role
      ansible.builtin.import_role:
        name: amnezia_proxy
      tags: [amnezia, proxy]

- name: Regular nodes
  hosts: nodes
  become: true
  tasks:
    - name: Apply zsh role
      ansible.builtin.import_role:
        name: zsh
      tags: [shell]

    - name: Apply docker role
      ansible.builtin.import_role:
        name: docker
      tags: [docker]

- name: SSH trust for all Nodes
  hosts: all
  become: true
  tasks:
    - name: Apply ssh_trust role
      ansible.builtin.import_role:
        name: ssh_trust
      tags: [ssh]

- name: Operations servers
  hosts: operations
  become: true
  tasks:
    - name: Apply zsh role
      ansible.builtin.import_role:
        name: zsh
      tags: [shell]

    - name: Apply fail2ban role
      ansible.builtin.import_role:
        name: fail2ban
      tags: [security]

    - name: Apply ansible role
      ansible.builtin.import_role:
        name: ansible
      tags: [ansible]

    - name: Apply docker role
      ansible.builtin.import_role:
        name: docker
      tags: [docker]

    - name: Apply docker_context role
      ansible.builtin.import_role:
        name: docker_context
      tags: [docker, docker_context]
