# Cuda
nvidia_distro_name: "{{ ansible_distribution | lower }}{{ ansible_distribution_major_version }}"
nvidia_container_toolkit_arch: >-
  {{ 'amd64' if ansible_facts['architecture'] == 'x86_64'
     else 'arm64' if ansible_facts['architecture'] in ['aarch64', 'arm64']
     else ansible_facts['architecture'] }}

# Docker
nvidia_configure_docker_runtime: false
