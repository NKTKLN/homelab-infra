- name: Download NVIDIA Container Toolkit GPG key
  ansible.builtin.get_url:
    url: https://nvidia.github.io/libnvidia-container/gpgkey
    dest: /etc/apt/keyrings/nvidia-container-toolkit.asc
    mode: "0644"
    timeout: 60

- name: Dearmor NVIDIA Container Toolkit GPG key
  ansible.builtin.command:
    cmd: >
      gpg --dearmor -o /etc/apt/keyrings/nvidia-container-toolkit.gpg /etc/apt/keyrings/nvidia-container-toolkit.asc
  args:
    creates: /etc/apt/keyrings/nvidia-container-toolkit.gpg

- name: Add NVIDIA Container Toolkit repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/nvidia-container-toolkit.gpg] https://nvidia.github.io/libnvidia-container/stable/deb/amd64 /
    filename: nvidia-container-toolkit
    state: present
    update_cache: false

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install NVIDIA Container Toolkit
  ansible.builtin.apt:
    name: nvidia-container-toolkit
    state: present

- name: Configure NVIDIA runtime for Docker
  ansible.builtin.command:
    cmd: nvidia-ctk runtime configure --runtime=docker
  changed_when: false
  when: nvidia_configure_docker_runtime | bool
  notify: restart docker

- name: Configure NVIDIA runtime for containerd
  ansible.builtin.command:
    cmd: nvidia-ctk runtime configure --runtime=containerd
  changed_when: false
  when: nvidia_configure_containerd_runtime | bool
  notify: restart containerd
