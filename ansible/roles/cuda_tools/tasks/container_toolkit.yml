- name: Download NVIDIA Container Toolkit GPG key
  ansible.builtin.get_url:
    url: https://nvidia.github.io/libnvidia-container/gpgkey
    dest: /etc/apt/keyrings/nvidia-container-toolkit.asc
    mode: "0644"
    timeout: 60

- name: Dearmor NVIDIA Container Toolkit GPG key
  ansible.builtin.command:
    cmd: >
      gpg --dearmor -o /etc/apt/keyrings/nvidia-container-toolkit.gpg /etc/apt/keyrings/nvidia-container-toolkit.asc
  args:
    creates: /etc/apt/keyrings/nvidia-container-toolkit.gpg

- name: Add NVIDIA Container Toolkit repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/nvidia-container-toolkit.gpg] https://nvidia.github.io/libnvidia-container/stable/deb/{{ nvidia_container_toolkit_arch }} /
    filename: nvidia-container-toolkit
    state: present
    update_cache: false

- name: Install NVIDIA Container Toolkit
  ansible.builtin.apt:
    name: nvidia-container-toolkit
    state: present
    update_cache: true
    cache_valid_time: 3600
