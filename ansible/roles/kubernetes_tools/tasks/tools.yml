# Helm — installed through the official Helm install script.
- name: Ensure CLI state directory exists
  ansible.builtin.file:
    path: "{{ kubernetes_cli_state_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: >
    kubernetes_install_helm | bool
    or kubernetes_cli_tools | length > 0

- name: Ensure Helm installer dependencies are installed
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - openssl
      - tar
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: kubernetes_install_helm | bool

- name: Install Helm through official get-helm-4 script
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-4 \
      | bash -s -- --no-sudo
  args:
    executable: /bin/bash
  environment:
    HELM_INSTALL_DIR: "{{ kubernetes_cli_bin_dir }}"
    VERIFY_CHECKSUM: "true"
    VERIFY_SIGNATURES: "false"
    USE_SUDO: "false"
  register: helm_install_result
  changed_when: >-
    'installed into' in helm_install_result.stdout
    or 'Changing from version' in helm_install_result.stdout
  when: kubernetes_install_helm | bool

- name: Check Helm version
  ansible.builtin.command: "{{ kubernetes_cli_bin_dir }}/helm version --short"
  register: helm_version_check
  changed_when: false
  when: kubernetes_install_helm | bool

# Standalone CLI binaries from GitHub releases.
- name: Install standalone Kubernetes CLI tools
  ansible.builtin.include_tasks: tools_binary.yml
  loop: "{{ kubernetes_cli_tools }}"
  loop_control:
    loop_var: tool
    label: "{{ tool.name }} {{ tool.version }}"
  when: kubernetes_cli_tools | length > 0
