# Kubernetes
kubernetes_enabled: true
kubernetes_version: "v1.35"
kubernetes_user: "{{ ansible_user }}"

# Extra CLI tooling installed alongside kubectl on the management node.
kubernetes_install_tools: true

# Helm
kubernetes_install_helm: true

# Standalone CLI binaries pulled from GitHub releases.
kubernetes_cli_bin_dir: /usr/local/bin
kubernetes_cli_state_dir: /usr/local/lib/kube-cli

kubernetes_cli_tools:
  - name: k9s
    version: "v0.32.7"
    archive: true
    url_template: "https://github.com/derailed/k9s/releases/download/{version}/k9s_Linux_amd64.tar.gz"

  - name: stern
    version: "1.32.0"
    archive: true
    url_template: "https://github.com/stern/stern/releases/download/v{version}/stern_{version}_linux_amd64.tar.gz"

  - name: kustomize
    version: "5.5.0"
    archive: true
    url_template: "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv{version}/kustomize_v{version}_linux_amd64.tar.gz"

  - name: helmfile
    version: "0.169.0"
    archive: true
    url_template: "https://github.com/helmfile/helmfile/releases/download/v{version}/helmfile_{version}_linux_amd64.tar.gz"

  - name: argocd
    version: "2.13.3"
    archive: false
    url_template: "https://github.com/argoproj/argo-cd/releases/download/v{version}/argocd-linux-amd64"

  - name: kubectx
    version: "0.9.5"
    archive: true
    url_template: "https://github.com/ahmetb/kubectx/releases/download/v{version}/kubectx_v{version}_linux_x86_64.tar.gz"

  - name: kubens
    version: "0.9.5"
    archive: true
    url_template: "https://github.com/ahmetb/kubectx/releases/download/v{version}/kubens_v{version}_linux_x86_64.tar.gz"
