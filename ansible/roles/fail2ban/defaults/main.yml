# Fail2ban (SSH jail)
ssh_port: 22
fail2ban_sshd_enabled: true # enable SSH jail
fail2ban_sshd_maxretry: 5 # failed attempts before ban
fail2ban_sshd_findtime: 600 # time window for counting failures (seconds)
fail2ban_sshd_bantime: 3600 # ban duration (seconds)

# Log source (depends on distro/logging setup)
fail2ban_sshd_logpath: /var/log/auth.log
fail2ban_sshd_backend: systemd # use systemd journal (recommended on modern Debian/Ubuntu)
