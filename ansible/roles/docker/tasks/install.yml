- name: Ensure apt keyrings dir
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker GPG key (asc)
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ docker_apt_os }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Convert Docker key to keyring (.gpg)
  ansible.builtin.shell: |
    set -euo pipefail
    gpg --dearmor < /etc/apt/keyrings/docker.asc > /etc/apt/keyrings/docker.gpg.tmp
    install -m 0644 /etc/apt/keyrings/docker.gpg.tmp /etc/apt/keyrings/docker.gpg
    rm -f /etc/apt/keyrings/docker.gpg.tmp
  args:
    executable: /bin/bash
  changed_when: false

- name: Add Docker repository (signed-by keyring)
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ docker_apt_arch }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/{{ docker_apt_os }} {{ docker_apt_release }} stable
    state: present
    filename: docker
    update_cache: true

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present

- name: Ensure Docker service is enabled and running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
