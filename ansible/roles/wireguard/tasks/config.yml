- name: Deploy WireGuard server config
  ansible.builtin.template:
    src: wireguard.conf.j2
    dest: "{{ wireguard_config_dir }}/{{ wireguard_interface }}.conf"
    owner: root
    group: root
    mode: "0600"
  notify: restart wireguard

- name: Deploy full-tunnel peer config
  ansible.builtin.template:
    src: peer.conf.j2
    dest: "{{ wireguard_peer_dir }}/{{ wireguard_interface }}.conf"
    owner: root
    group: root
    mode: "0600"

- name: Deploy split-tunnel peer config
  ansible.builtin.template:
    src: peer_split_tunnel.conf.j2
    dest: "{{ wireguard_peer_dir }}/{{ wireguard_interface }}_split_tunnel.conf"
    owner: root
    group: root
    mode: "0600"
