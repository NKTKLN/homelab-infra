- name: Find peer config files
  ansible.builtin.find:
    paths: "{{ wireguard_peer_dir }}"
    file_type: file
    patterns: "*.conf"
  register: wireguard_peer_config_files

- name: Ensure local fetch directory exists
  ansible.builtin.file:
    path: "{{ wireguard_fetch_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Fetch peer config files
  ansible.builtin.fetch:
    src: "{{ item.path }}"
    dest: "{{ wireguard_fetch_dir }}/"
    flat: true
  loop: "{{ wireguard_peer_config_files.files }}"
