- name: Ensure Debian family
  ansible.builtin.assert:
    that: ansible_facts.os_family == "Debian"
    fail_msg: "This role supports only Debian/Ubuntu."

- name: Ensure WireGuard endpoint is set
  ansible.builtin.assert:
    that: wireguard_endpoint | length > 0
    fail_msg: "wireguard_endpoint must be set (public host/IP clients connect to)."

- name: Ensure web UI password hash is set
  ansible.builtin.assert:
    that: wireguard_password_hash | length > 0
    fail_msg: >-
      wireguard_password_hash must be set. Generate one with:
      docker run --rm {{ wireguard_image }} wgpw 'your-password'

- name: Ensure TUN device is available
  ansible.builtin.stat:
    path: /dev/net/tun
  register: wireguard_tun_dev

- name: Fail if TUN device is missing
  ansible.builtin.assert:
    that: wireguard_tun_dev.stat.exists
    fail_msg: >-
      /dev/net/tun is not present in this container. Kernel modules cannot be
      loaded from inside an unprivileged LXC guest. Load the 'tun' module on the
      Proxmox host (e.g. add 'tun' to /etc/modules-load.d/) and pass the device
      through to this container.

- name: Ensure project directory
  ansible.builtin.file:
    path: "{{ wireguard_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Ensure WireGuard config directory
  ansible.builtin.file:
    path: "{{ wireguard_dir }}/config"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ wireguard_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0640"
  notify: restart wg-easy

- name: Ensure wg-easy is running
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ wireguard_dir }}"
  register: wireguard_compose
  changed_when: >-
    ('Started' in wireguard_compose.stderr)
    or ('Created' in wireguard_compose.stderr)
    or ('Recreated' in wireguard_compose.stderr)

- name: Allow WireGuard UDP port from LAN
  community.general.ufw:
    rule: allow
    src: "{{ wireguard_lan_cidr }}"
    port: "{{ wireguard_port }}"
    proto: udp

- name: Allow web UI port from LAN
  community.general.ufw:
    rule: allow
    src: "{{ wireguard_lan_cidr }}"
    port: "{{ wireguard_ui_port }}"
    proto: tcp
