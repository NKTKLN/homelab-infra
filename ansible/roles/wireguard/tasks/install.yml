- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install wireguard
  ansible.builtin.apt:
    name: wireguard
    state: present

- name: Create WireGuard config directory
  ansible.builtin.file:
    path: "{{ wireguard_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Create WireGuard peer config directory
  ansible.builtin.file:
    path: "{{ wireguard_peer_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Ensure WireGuard service is enabled and running
  ansible.builtin.systemd:
    name: "wg-quick@{{ wireguard_interface }}"
    state: started
    enabled: true
