- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download OpenTofu GPG key
  ansible.builtin.get_url:
    url: https://get.opentofu.org/opentofu.gpg
    dest: /etc/apt/keyrings/opentofu.asc
    mode: "0644"
    timeout: 60
  environment: >-
    {{
      {
        'http_proxy': proxy_http_url,
        'https_proxy': proxy_http_url,
        'HTTP_PROXY': proxy_http_url,
        'HTTPS_PROXY': proxy_http_url,
        'no_proxy': proxy_no_proxy,
        'NO_PROXY': proxy_no_proxy
      } if opentofu_use_proxy | bool else {}
    }}
  register: opentofu_key_download
  retries: 3
  delay: 5
  until: opentofu_key_download is succeeded

- name: Dearmor OpenTofu GPG key
  ansible.builtin.command: >
    gpg --dearmor -o /etc/apt/keyrings/opentofu.gpg /etc/apt/keyrings/opentofu.asc
  args:
    creates: /etc/apt/keyrings/opentofu.gpg

- name: Add OpenTofu repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/opentofu.gpg] https://packages.opentofu.org/opentofu/tofu/apt/ all main
    filename: opentofu
    state: present
    update_cache: false
  environment: >-
    {{
      {
        'http_proxy': proxy_http_url,
        'https_proxy': proxy_http_url,
        'HTTP_PROXY': proxy_http_url,
        'HTTPS_PROXY': proxy_http_url,
        'no_proxy': proxy_no_proxy,
        'NO_PROXY': proxy_no_proxy
      } if opentofu_use_proxy | bool else {}
    }}

- name: Install OpenTofu
  ansible.builtin.apt:
    name: opentofu
    state: present
    update_cache: true
  environment: >-
    {{
      {
        'http_proxy': proxy_http_url,
        'https_proxy': proxy_http_url,
        'HTTP_PROXY': proxy_http_url,
        'HTTPS_PROXY': proxy_http_url,
        'no_proxy': proxy_no_proxy,
        'NO_PROXY': proxy_no_proxy
      } if opentofu_use_proxy | bool else {}
    }}
