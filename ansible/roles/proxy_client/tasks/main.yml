- name: Ensure Debian family
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == "Debian"
    fail_msg: "This role supports only Debian/Ubuntu."

- ansible.builtin.import_tasks: install.yml
  tags: [proxy, install]

- ansible.builtin.import_tasks: shell.yml
  tags: [proxy, shell]

- name: Verify HTTP proxy connectivity
  ansible.builtin.uri:
    url: https://example.com
    method: GET
    status_code: 200
    timeout: 20
    return_content: false
  environment:
    http_proxy: "{{ proxy_http_url }}"
    https_proxy: "{{ proxy_http_url }}"
    HTTP_PROXY: "{{ proxy_http_url }}"
    HTTPS_PROXY: "{{ proxy_http_url }}"
    no_proxy: "{{ proxy_no_proxy }}"
    NO_PROXY: "{{ proxy_no_proxy }}"
  register: proxy_test
  retries: 5
  delay: 3
  until: proxy_test is succeeded
