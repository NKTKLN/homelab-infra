- name: Install proxy packages
  ansible.builtin.apt:
    name:
      - shadowsocks-libev
      - privoxy
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Configure shadowsocks client
  ansible.builtin.template:
    src: ss_client.json.j2
    dest: /etc/shadowsocks-libev/client.json
    owner: root
    group: root
    mode: "0644"
  notify: restart ss

- name: Remove default IPv4 Privoxy listen address
  ansible.builtin.replace:
    path: /etc/privoxy/config
    regexp: '^\s*listen-address\s+127\.0\.0\.1:8118$'
    replace: '# listen-address 127.0.0.1:8118'
  notify: restart privoxy

- name: Remove default IPv6 Privoxy listen address
  ansible.builtin.replace:
    path: /etc/privoxy/config
    regexp: '^\s*listen-address\s+\[::1\]:8118$'
    replace: '# listen-address [::1]:8118'
  notify: restart privoxy

- name: Remove existing forward-socks5t rules
  ansible.builtin.replace:
    path: /etc/privoxy/config
    regexp: '^\s*forward-socks5t\s+/.*$'
    replace: '# removed by Ansible'
  notify: restart privoxy

- name: Add managed Privoxy proxy block
  ansible.builtin.blockinfile:
    path: /etc/privoxy/config
    marker: "# {mark} ANSIBLE MANAGED PROXY"
    block: "{{ lookup('template', 'privoxy_config.j2') }}"
  notify: restart privoxy

- name: Ensure shadowsocks service is enabled and running
  ansible.builtin.service:
    name: shadowsocks-libev-local@client
    state: started
    enabled: true

- name: Ensure privoxy service is enabled and running
  ansible.builtin.service:
    name: privoxy
    state: started
    enabled: true
