- name: Ensure .ssh directory exists
  ansible.builtin.file:
    path: "/home/{{ ssh_trust_user }}/.ssh"
    state: directory
    owner: "{{ ssh_trust_user }}"
    group: "{{ ssh_trust_user }}"
    mode: "0700"

- name: Create SSH keypair
  community.crypto.openssh_keypair:
    path: "{{ ssh_private_key_path }}"
    type: "{{ ssh_key_type }}"
    owner: "{{ ssh_trust_user }}"
    group: "{{ ssh_trust_user }}"
    mode: "0600"

- name: Read public key
  ansible.builtin.slurp:
    src: "{{ ssh_private_key_path }}.pub"
  register: ops_pub_file

- name: Set public key fact
  ansible.builtin.set_fact:
    ops_pub: "{{ ops_pub_file.content | b64decode | trim }}"

- name: Install authorized keys from all nodes
  ansible.posix.authorized_key:
    user: "{{ ssh_trust_user }}"
    key: "{{ hostvars[item]['ops_pub'] }}"
  loop: "{{ groups['all'] }}"
  when: hostvars[item]['ops_pub'] is defined

- name: Generate SSH config with hosts from inventory
  ansible.builtin.template:
    src: ssh_config.j2
    dest: "/home/{{ ssh_trust_user }}/.ssh/config"
    owner: "{{ ssh_trust_user }}"
    group: "{{ ssh_trust_user }}"
    mode: "0600"
