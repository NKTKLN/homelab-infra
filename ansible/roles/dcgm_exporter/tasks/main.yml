- name: Ensure Debian family
  ansible.builtin.assert:
    that: ansible_facts.os_family == "Debian"
    fail_msg: "This role supports only Debian/Ubuntu."

- name: Ensure project directory
  ansible.builtin.file:
    path: "{{ dcgm_exporter_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ dcgm_exporter_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0640"
  notify: restart dcgm-exporter

- name: Ensure dcgm-exporter is running
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ dcgm_exporter_dir }}"
  register: dcgm_exporter_compose
  changed_when: >-
    ('Started' in dcgm_exporter_compose.stderr)
    or ('Created' in dcgm_exporter_compose.stderr)
    or ('Recreated' in dcgm_exporter_compose.stderr)

- name: Allow dcgm-exporter metrics port from LAN
  community.general.ufw:
    rule: allow
    src: "{{ dcgm_exporter_lan_cidr }}"
    port: "{{ dcgm_exporter_port }}"
    proto: tcp
