- name: Install k3s master
  shell: |
    curl -sfL https://get.k3s.io | sh -
  args:
    creates: /usr/local/bin/k3s
  when: inventory_hostname == groups['k8s-master'][0]

- name: Wait for k3s token
  ansible.builtin.wait_for:
    path: /var/lib/rancher/k3s/server/node-token
  when: inventory_hostname == groups['k8s-master'][0]

- name: Read k3s master node token
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token_raw
  when: inventory_hostname == groups['k8s-master'][0]

- name: Save k3s master token as fact
  ansible.builtin.set_fact:
    k3s_node_token: "{{ k3s_token_raw.content | b64decode | trim }}"
  when: inventory_hostname == groups['k8s-master'][0]

- name: Install k3s worker
  shell: |
    curl -sfL https://get.k3s.io | sh -
  args:
    creates: /usr/local/bin/k3s
  environment:
    K3S_URL: "https://{{ hostvars[groups['k8s-master'][0]].ansible_host }}:6443"
    K3S_TOKEN: "{{ hostvars[groups['k8s-master'][0]].k3s_node_token }}"
  when: inventory_hostname != groups['k8s-master'][0]
