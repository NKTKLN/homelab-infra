- name: Ensure mount point exists
  ansible.builtin.file:
    path: "{{ virtiofs_mount_path }}"
    state: directory
    owner: "{{ virtiofs_owner }}"
    group: "{{ virtiofs_group }}"
    mode: "{{ virtiofs_mode }}"

- name: Mount virtiofs share (persist in fstab)
  ansible.builtin.mount:
    path: "{{ virtiofs_mount_path }}"
    src: "{{ virtiofs_source }}"
    fstype: virtiofs
    opts: "{{ virtiofs_mount_opts }}"
    state: mounted
