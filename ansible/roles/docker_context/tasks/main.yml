- name: Check existing Docker contexts
  ansible.builtin.command: docker context ls --format '{{"{{.Name}}"}}'
  register: docker_contexts_existing
  changed_when: false
  become: true
  become_user: "{{ docker_user }}"

- name: Create Docker contexts for workers
  ansible.builtin.command:
    argv:
      - docker
      - context
      - create
      - "{{ item.name }}"
      - --docker
      - >-
        host=ssh://{{ hostvars[item.target_host]['ansible_user'] }}@{{
        hostvars[item.target_host]['ansible_host'] }}:{{
        hostvars[item.target_host]['ansible_port'] | default(22) }}
  loop: "{{ docker_contexts }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.name not in docker_contexts_existing.stdout_lines
  become: true
  become_user: "{{ docker_user }}"

- name: Apply default Docker context
  ansible.builtin.command:
    argv:
      - docker
      - context
      - use
      - "{{ docker_context_use }}"
  become: true
  become_user: "{{ docker_user }}"
