# Docker context
docker_user: "{{ ansible_user }}"

# List of Docker contexts to create. Each item points at an inventory host
# whose connection details are used to build the SSH endpoint.
docker_contexts:
  - name: homelab-node-1
    target_host: vm-node-1
  - name: homelab-gpu-worker-1
    target_host: vm-gpu-worker-1

# Context to activate after creation
docker_context_use: "{{ docker_contexts[0].name }}"
