- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install NFS server package
  ansible.builtin.apt:
    name: nfs-kernel-server
    state: present

- name: Ensure NFS service is enabled and running
  ansible.builtin.service:
    name: nfs-kernel-server
    state: started
    enabled: true
