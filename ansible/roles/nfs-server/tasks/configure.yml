- name: Ensure virtiofs mount directory exists
  ansible.builtin.file:
    path: "{{ virtiofs_mount_path }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure exports.d directory exists
  ansible.builtin.file:
    path: /etc/exports.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure NFS exports (role-managed)
  ansible.builtin.template:
    src: exports.j2
    dest: /etc/exports.d/virtiofs.exports
    owner: root
    group: root
    mode: "0644"
  notify: reload nfs exports
