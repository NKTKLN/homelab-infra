[defaults]
# Resolve roles from this repo only
roles_path = roles

# Default inventory for this environment
inventory = inventories/home/hosts.ini

# Keep workspace clean (no *.retry)
retry_files_enabled = False

# SSH host key verification (MITM protection)
host_key_checking = True

# Auto-detect Python on targets (quiet)
interpreter_python = auto_silent

# Readable output in CLI/CI logs
stdout_callback = ansible.builtin.default
bin_ansible_callbacks = True
deprecation_warnings=False

[ssh_connection]
# Faster runs via SSH pipelining (requires no requiretty)
pipelining = True
