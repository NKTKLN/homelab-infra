version: '3'

env:
  TERRAFORM_DIR: 'terraform/envs/prod'
  ANSIBLE_DIR: 'ansible'
  SCRIPTS_DIR: 'scripts'

  TF_PROVIDER: '{{.TF_PROVIDER | default "terraform"}}'

  ANSIBLE_INVENTORY: 'inventory/home/hosts.ini'

tasks:
   # ======== Environment ========
  sync:
    desc: Sync dependencies (dev group) using uv
    cmds:
      - uv sync --all-groups

  sync-frozen:
    desc: Sync dependencies using locked versions
    cmds:
      - uv sync --frozen --all-groups

  init:
    desc: Full project setup
    cmds:
      - task: sync
      - task: precommit

  # ======== Pre-commit ========
  precommit:
    desc: Install git hooks
    cmds:
      - uv run pre-commit install --install-hooks

  precommit-run:
    desc: Run pre-commit on all files
    cmds:
      - uv run pre-commit run --all-files

  # ======== Commitizen ========
  cz-commit:
    desc: Commit using Conventional Commits
    cmds:
      - uv run cz commit

  cz-check:
    desc: Check commit messages
    cmds:
      - uv run cz check

  # ======== Terraform / OpenTofu ========
  tf-init:
    desc: Initialize Terraform/OpenTofu
    dir: '{{.TERRAFORM_DIR}}'
    cmds:
      - '{{.TF_PROVIDER}} init'

  tf-validate:
    desc: Validate Terraform/OpenTofu configuration
    dir: '{{.TERRAFORM_DIR}}'
    cmds:
      - '{{.TF_PROVIDER}} validate'

  tf-plan:
    desc: Show execution plan
    dir: '{{.TERRAFORM_DIR}}'
    cmds:
      - '{{.TF_PROVIDER}} plan'

  tf-apply:
    desc: Apply infrastructure changes
    dir: '{{.TERRAFORM_DIR}}'
    cmds:
      - '{{.TF_PROVIDER}} apply'

  tf-destroy:
    desc: Destroy managed infrastructure
    dir: '{{.TERRAFORM_DIR}}'
    cmds:
      - '{{.TF_PROVIDER}} destroy'

  tf-fmt:
    desc: Format Terraform/OpenTofu files
    dir: '{{.TERRAFORM_DIR}}'
    cmds:
      - '{{.TF_PROVIDER}} fmt -recursive'

  tf-check:
    desc: Run fmt → validate (quick check)
    cmds:
      - task: tf-fmt
      - task: tf-validate

  tf-all:
    desc: Run fmt → init → validate → plan (common workflow)
    cmds:
      - task: tf-fmt
      - task: tf-init
      - task: tf-validate
      - task: tf-plan

  tf-deploy:
    desc: Full deploy workflow (init → apply)
    cmds:
      - task: tf-init
      - task: tf-apply

  # ======== Ansible ========
  yaml-fmt:
    desc: Format YAML files (yamlfmt) in Ansible dir
    dir: '{{.ANSIBLE_DIR}}'
    cmds:
      - yamlfmt .

  yaml-lint:
    desc: Lint YAML files (yamllint) in Ansible dir
    deps: [sync]
    dir: '{{.ANSIBLE_DIR}}'
    cmds:
      - uv run yamllint -c ../.yamllint .

  ansible-lint:
    desc: Run ansible-lint on playbooks
    deps: [sync]
    dir: '{{.ANSIBLE_DIR}}'
    cmds:
      - uv run ansible-lint .

  ansible-fmt:
    desc: Format YAML then run linters (fast)
    cmds:
      - task: yaml-fmt
      - task: ansible-lint
      - task: yaml-lint

  ansible-checks:
    desc: YAML lint + ansible-lint + playbook syntax-check
    deps: [sync]
    dir: '{{.ANSIBLE_DIR}}'
    cmds:
      - uv run yamllint -c ../.yamllint .
      - uv run ansible-lint .
      - uv run ansible-playbook -i {{.ANSIBLE_INVENTORY}} playbooks/site.yml --syntax-check

  ansible-ping:
    desc: Ping all hosts from inventory
    deps: [sync]
    dir: '{{.ANSIBLE_DIR}}'
    cmds:
      - uv run ansible all -i {{.ANSIBLE_INVENTORY}} -m ping

  ansible-check:
    desc: Run playbook in check mode (dry-run)
    deps: [sync]
    dir: '{{.ANSIBLE_DIR}}'
    cmds:
      - uv run ansible-playbook -i {{.ANSIBLE_INVENTORY}} playbooks/site.yml --check

  ansible-run:
    desc: Apply Ansible configuration
    deps: [sync]
    dir: '{{.ANSIBLE_DIR}}'
    cmds:
      - uv run ansible-playbook -i {{.ANSIBLE_INVENTORY}} playbooks/site.yml

  ansible-deploy:
    desc: Lint → check → apply (safe workflow)
    deps: [sync]
    cmds:
      - task: ansible-lint
      - task: ansible-check
      - task: ansible-run

  # ======== Scripts ========
  scripts-refresh-known-hosts:
    desc: Refresh SSH known_hosts from Ansible inventory
    dir: '{{.SCRIPTS_DIR}}'
    cmds:
      - bash refresh_known_hosts.sh
